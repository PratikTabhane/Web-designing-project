<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Feedback Form</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ✅ NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-gradient shadow">
  <div class="container">
    <a class="navbar-brand fw-bold" href="#"><i class="bi bi-clipboard-check"></i> Feedback System</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Feedback</a></li>
        <li class="nav-item"><a class="nav-link" href="#">About</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- ✅ CAROUSEL -->
<div id="carouselExample" class="carousel slide" data-bs-ride="carousel">
  <div class="carousel-inner">

    <div class="carousel-item active">
      <img src="https://img.freepik.com/free-vector/chalkboard-with-math-elements_1411-88.jpg" class="d-block w-50">
    </div>

    

  </div>
</div>

<!-- ✅ FORM -->
<div class="container my-5">

<div class="card main-card shadow-lg p-4">

<h2 class="text-center text-primary fw-bold">Student Feedback Form</h2>
<p class="text-center text-muted">Course: Differential Equation</p>

<form>

<div class="row">

<!-- Personal -->
<div class="col-md-6">
<div class="card mb-3">
<div class="card-header bg-secondary text-white"><i class="bi bi-person"></i> Personal Details</div>

<div class="card-body">

<input type="text" class="form-control mb-3" placeholder="Student Name">
<input type="email" class="form-control mb-3" placeholder="Email">
<input type="tel" class="form-control mb-3" placeholder="Mobile">
<input type="number" class="form-control" placeholder="Registration No">

</div>
</div>
</div>

<!-- Evaluation -->
<div class="col-md-6">
<div class="card mb-3">
<div class="card-header bg-info text-white"><i class="bi bi-bar-chart"></i> Evaluation</div>

<div class="card-body">

<p class="fw-bold">Satisfaction Level:</p>
<div class="form-check">
<input type="radio" name="sat"> Very Satisfied
</div>
<div class="form-check">
<input type="radio" name="sat"> Satisfied
</div>

<p class="fw-bold mt-3">Content:</p>
<div class="form-check">
<input type="radio" name="content"> Relevant
</div>
<div class="form-check">
<input type="radio" name="content"> Irrelevant
</div>

</div>
</div>
</div>

</div>

<!-- Feedback -->
<div class="card mb-3">
<div class="card-header bg-warning"><i class="bi bi-chat-left-text"></i> Detailed Feedback</div>

<div class="card-body row">

<div class="col-md-6">
<textarea class="form-control" placeholder="Most Valuable Part"></textarea>
</div>

<div class="col-md-6">
<textarea class="form-control" placeholder="Areas to Improve"></textarea>
</div>

</div>
</div>

<!-- Suggestions -->
<div class="card mb-3">
<div class="card-header bg-success text-white"><i class="bi bi-lightbulb"></i> Suggestions</div>

<div class="card-body">
<textarea class="form-control mb-2" placeholder="Suggestions"></textarea>
<textarea class="form-control mb-2" placeholder="Challenges"></textarea>
<textarea class="form-control" placeholder="Comments"></textarea>
</div>
</div>

<!-- Submit -->
<div class="text-center">
<button class="btn btn-primary submit-btn">Submit Feedback</button>
</div>

</form>

</div>
</div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
