<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Feedback Form</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">

<!-- ✅ NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand" href="#">Feedback System</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Feedback</a></li>
        <li class="nav-item"><a class="nav-link" href="#">About</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- ✅ CAROUSEL -->
<div id="carouselExample" class="carousel slide" data-bs-ride="carousel">

  <div class="carousel-inner">
    <div class="carousel-item active">
      <img src="https://via.placeholder.com/1200x300/0d6efd/ffffff?text=Student+Feedback+System" class="d-block w-100">
    </div>

    <div class="carousel-item">
      <img src="https://via.placeholder.com/1200x300/198754/ffffff?text=Give+Your+Feedback" class="d-block w-100">
    </div>

    <div class="carousel-item">
      <img src="https://via.placeholder.com/1200x300/ffc107/000000?text=Improve+Learning+Experience" class="d-block w-100">
    </div>
  </div>

</div>

<!-- ✅ FORM SECTION -->
<div class="container my-5">

    <div class="card shadow p-4">

        <h2 class="text-center text-primary">Student's Feedback Form</h2>
        <p class="text-center">Course: Successive Differentiation and Differential Equation</p>

        <form>

            <!-- ✅ GRID SYSTEM START -->
            <div class="row">

                <!-- Personal Details -->
                <div class="col-md-6">
                    <div class="card mb-3">
                        <div class="card-header bg-secondary text-white">Personal Details</div>
                        <div class="card-body">

                            <label class="form-label">Student Name</label>
                            <input type="text" class="form-control mb-2">

                            <label class="form-label">Email</label>
                            <input type="email" class="form-control mb-2">

                            <label class="form-label">Mobile</label>
                            <input type="tel" class="form-control mb-2">

                            <label class="form-label">Registration No</label>
                            <input type="number" class="form-control">

                        </div>
                    </div>
                </div>

                <!-- Section A -->
                <div class="col-md-6">
                    <div class="card mb-3">
                        <div class="card-header bg-info text-white">Overall Evaluation</div>
                        <div class="card-body">

                            <p>Satisfaction Level:</p>
                            <div class="form-check">
                                <input type="radio" name="sat"> Very Satisfied
                            </div>
                            <div class="form-check">
                                <input type="radio" name="sat"> Satisfied
                            </div>

                            <p class="mt-3">Content Relevance:</p>
                            <div class="form-check">
                                <input type="radio" name="content"> Relevant
                            </div>
                            <div class="form-check">
                                <input type="radio" name="content"> Irrelevant
                            </div>

                        </div>
                    </div>
                </div>

            </div>
            <!-- ✅ GRID END -->

            <!-- Section B -->
            <div class="card mb-3">
                <div class="card-header bg-warning">Detailed Feedback</div>
                <div class="card-body">

                    <div class="row">
                        <div class="col-md-6">
                            <label>Most Valuable Part</label>
                            <textarea class="form-control"></textarea>
                        </div>

                        <div class="col-md-6">
                            <label>Areas to Improve</label>
                            <textarea class="form-control"></textarea>
                        </div>
                    </div>

                </div>
            </div>

            <!-- Section C -->
            <div class="card mb-3">
                <div class="card-header bg-success text-white">Suggestions</div>
                <div class="card-body">

                    <textarea class="form-control mb-2" placeholder="Suggestions"></textarea>
                    <textarea class="form-control mb-2" placeholder="Challenges"></textarea>
                    <textarea class="form-control" placeholder="Comments"></textarea>

                </div>
            </div>

            <!-- Submit -->
            <div class="text-center">
                <button class="btn btn-primary px-5">Submit</button>
            </div>

        </form>

    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
